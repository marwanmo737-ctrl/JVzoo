<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعيين كلمة المرور — LandingAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="brand" style="justify-content:center;margin-bottom:24px">
    <div class="brand-logo">L</div><span>LandingAI</span>
  </div>
  <div class="card auth-card">
    <h3 style="margin-bottom:6px">🎉 خطوة أخيرة لتفعيل حسابك</h3>
    <p class="hint">قم بتعيين كلمة مرور خاصة بك للدخول.</p>
    <div id="spError" class="auth-error" style="display:none"></div>
    <div class="field">
      <label>كلمة المرور الجديدة</label>
      <input type="password" id="newPassword" placeholder="8 أحرف على الأقل مع رقم">
    </div>
    <div class="field">
      <label>تأكيد كلمة المرور</label>
      <input type="password" id="confirmPassword">
    </div>
    <button class="btn-generate" id="setPasswordBtn">تفعيل الحساب والدخول</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

document.getElementById("setPasswordBtn").onclick = async () => {
  const password = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  const errEl = document.getElementById("spError");
  errEl.style.display = "none";

  if (!token) { errEl.textContent = "رابط غير صالح."; errEl.style.display = "block"; return; }
  if (password !== confirm) { errEl.textContent = "كلمتا المرور غير متطابقتين."; errEl.style.display = "block"; return; }

  try {
    const res = await fetch("/api/auth/set-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    window.location.href = "/";
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
};
</script>
</body>
</html>
